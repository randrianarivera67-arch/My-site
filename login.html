{% extends "base.html" %}
{% block title %}Hiditra — SoftMada{% endblock %}

{% block extra_css %}
<style>
    .auth-page {
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .auth-card {
        background: var(--dark2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 420px;
    }

    .auth-title {
        font-family: 'Syne', sans-serif;
        font-size: 1.8rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
    }

    .auth-subtitle {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }

    .form-group {
        margin-bottom: 1.2rem;
    }

    label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    input {
        width: 100%;
        background: var(--dark3);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        color: var(--light);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        transition: border-color 0.2s;
        outline: none;
    }

    input:focus {
        border-color: var(--green);
    }

    .btn-full {
        width: 100%;
        justify-content: center;
        padding: 0.85rem;
        font-size: 1rem;
        margin-top: 0.5rem;
        border-radius: 10px;
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: var(--muted);
    }

    .auth-footer a {
        color: var(--green);
        text-decoration: none;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Hiditra 👋</h1>
        <p class="auth-subtitle">Hiditra amin'ny compte anao</p>

        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@anao.mg" required>
            </div>
            <div class="form-group">
                <label>Teny miafina</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-green btn-full">Hiditra</button>
        </form>

        <div class="auth-footer">
            Mbola tsy manana compte? <a href="/register">Misoratra anarana</a>
        </div>
    </div>
</div>
{% endblock %}
